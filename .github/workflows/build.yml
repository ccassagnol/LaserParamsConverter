name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore LaserParamsConverter.sln

      - name: Build
        run: dotnet build LaserParamsConverter.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test LaserParamsConverter.sln --configuration Release --no-build --verbosity normal
